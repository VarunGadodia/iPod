<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>iPod</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#16181c" />
<style>
  html, body { margin: 0; padding: 0; background: #16181c; overscroll-behavior: none; }
  #root { min-height: 100vh; }
</style>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
/* ============================================================
   iPod Classic × Spotify
   - Deploy to Vercel/Netlify, add your Spotify Client ID
   - In this preview, use Demo Mode to try the interface
   ============================================================ */

// ---------- Safe storage (falls back to memory in sandboxed previews) ----------
const memStore = {};
const store = {
  get(k) {
    try { return window.localStorage.getItem(k); } catch { return memStore[k] ?? null; }
  },
  set(k, v) {
    try { window.localStorage.setItem(k, v); } catch { memStore[k] = v; }
  },
  del(k) {
    try { window.localStorage.removeItem(k); } catch { delete memStore[k]; }
  },
};

// ---------- Spotify PKCE OAuth ----------
const SCOPES = [
  "user-read-playback-state",
  "user-modify-playback-state",
  "user-read-currently-playing",
  "playlist-read-private",
  "user-library-read",
  "user-top-read",
].join(" ");

function randomString(len) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  const vals = crypto.getRandomValues(new Uint8Array(len));
  return Array.from(vals).map(v => chars[v % chars.length]).join("");
}
async function sha256base64url(str) {
  const data = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest("SHA-256", data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function beginLogin(clientId) {
  const verifier = randomString(64);
  store.set("sp_verifier", verifier);
  store.set("sp_client_id", clientId);
  const challenge = await sha256base64url(verifier);
  const redirect = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: "code",
    redirect_uri: redirect,
    scope: SCOPES,
    code_challenge_method: "S256",
    code_challenge: challenge,
  });
  window.location.href = "https://accounts.spotify.com/authorize?" + params;
}
async function exchangeCode(code) {
  const redirect = window.location.origin + window.location.pathname;
  const body = new URLSearchParams({
    client_id: store.get("sp_client_id"),
    grant_type: "authorization_code",
    code,
    redirect_uri: redirect,
    code_verifier: store.get("sp_verifier"),
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body,
  });
  if (!res.ok) throw new Error("Token exchange failed");
  const json = await res.json();
  store.set("sp_token", json.access_token);
  store.set("sp_refresh", json.refresh_token);
  store.set("sp_expiry", String(Date.now() + json.expires_in * 1000));
  return json.access_token;
}
async function refreshToken() {
  const refresh = store.get("sp_refresh");
  if (!refresh) return null;
  const body = new URLSearchParams({
    client_id: store.get("sp_client_id"),
    grant_type: "refresh_token",
    refresh_token: refresh,
  });
  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body,
  });
  if (!res.ok) return null;
  const json = await res.json();
  store.set("sp_token", json.access_token);
  if (json.refresh_token) store.set("sp_refresh", json.refresh_token);
  store.set("sp_expiry", String(Date.now() + json.expires_in * 1000));
  return json.access_token;
}
async function getToken() {
  const expiry = Number(store.get("sp_expiry") || 0);
  let token = store.get("sp_token");
  if (!token) return null;
  if (Date.now() > expiry - 60000) token = await refreshToken();
  return token;
}
async function api(path, opts = {}) {
  const token = await getToken();
  if (!token) throw new Error("Not authenticated");
  const res = await fetch("https://api.spotify.com/v1" + path, {
    ...opts,
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json", ...(opts.headers || {}) },
  });
  if (res.status === 204) return null;
  if (!res.ok) throw new Error("API " + res.status);
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ---------- Demo data ----------
const DEMO = {
  playlists: [
    { id: "d1", name: "Late Night Drive", tracks: 42 },
    { id: "d2", name: "Gym — Heavy", tracks: 31 },
    { id: "d3", name: "Sunday Chill", tracks: 58 },
    { id: "d4", name: "2000s Throwback", tracks: 74 },
  ],
  tracks: [
    { id: "t1", name: "Midnight City", artist: "M83", album: "Hurry Up, We're Dreaming", duration: 244 },
    { id: "t2", name: "Instant Crush", artist: "Daft Punk", album: "Random Access Memories", duration: 337 },
    { id: "t3", name: "Electric Feel", artist: "MGMT", album: "Oracular Spectacular", duration: 229 },
    { id: "t4", name: "Nightcall", artist: "Kavinsky", album: "OutRun", duration: 258 },
    { id: "t5", name: "The Less I Know the Better", artist: "Tame Impala", album: "Currents", duration: 216 },
    { id: "t6", name: "Take On Me", artist: "a-ha", album: "Hunting High and Low", duration: 225 },
    { id: "t7", name: "Digital Love", artist: "Daft Punk", album: "Discovery", duration: 301 },
  ],
};

// ---------- Formatting ----------
const fmt = s => `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;

// ============================================================
function IPodSpotify() {
  // mode: "setup" | "demo" | "live"
  const [mode, setMode] = useState("setup");
  const [clientId, setClientId] = useState("");
  const [authError, setAuthError] = useState("");

  // Navigation stack: each frame { title, items, type }
  const [stack, setStack] = useState([]);
  const [selIndex, setSelIndex] = useState(0);
  const [screen, setScreen] = useState("menu"); // "menu" | "nowplaying"

  // Playback state
  const [np, setNp] = useState(null); // {name, artist, album, art, duration, progress, playing}
  const [demoQueue, setDemoQueue] = useState({ list: DEMO.tracks, idx: 0, playing: false, progress: 0 });
  const [flash, setFlash] = useState("");

  const flashMsg = m => { setFlash(m); setTimeout(() => setFlash(""), 1800); };

  // ---------- Startup: handle OAuth redirect ----------
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      exchangeCode(code)
        .then(() => {
          window.history.replaceState({}, "", window.location.pathname);
          setMode("live");
        })
        .catch(() => setAuthError("Sign-in failed. Check your Client ID and redirect URI, then try again."));
    } else if (store.get("sp_token")) {
      setMode("live");
    }
  }, []);

  // ---------- Root menu ----------
  const rootMenu = useCallback(() => ({
    title: "iPod",
    type: "root",
    items: [
      { label: "Music", action: "music" },
      { label: "Now Playing", action: "nowplaying" },
      { label: "Shuffle Songs", action: "shuffle" },
      { label: "Settings", action: "settings" },
    ],
  }), []);

  useEffect(() => {
    if (mode !== "setup") { setStack([rootMenu()]); setSelIndex(0); }
  }, [mode, rootMenu]);

  // ---------- Live polling of Spotify playback ----------
  useEffect(() => {
    if (mode !== "live") return;
    let alive = true;
    const poll = async () => {
      try {
        const d = await api("/me/player");
        if (!alive) return;
        if (d && d.item) {
          setNp({
            name: d.item.name,
            artist: d.item.artists.map(a => a.name).join(", "),
            album: d.item.album?.name || "",
            art: d.item.album?.images?.[1]?.url || d.item.album?.images?.[0]?.url || null,
            duration: d.item.duration_ms / 1000,
            progress: d.progress_ms / 1000,
            playing: d.is_playing,
          });
        } else setNp(null);
      } catch { /* token issues surface elsewhere */ }
    };
    poll();
    const t = setInterval(poll, 3000);
    return () => { alive = false; clearInterval(t); };
  }, [mode]);

  // ---------- Demo playback ticker ----------
  useEffect(() => {
    if (mode !== "demo") return;
    const t = setInterval(() => {
      setDemoQueue(q => {
        if (!q.playing) return q;
        const track = q.list[q.idx];
        let p = q.progress + 1;
        if (p >= track.duration) return { ...q, idx: (q.idx + 1) % q.list.length, progress: 0 };
        return { ...q, progress: p };
      });
    }, 1000);
    return () => clearInterval(t);
  }, [mode]);

  useEffect(() => {
    if (mode !== "demo") return;
    const track = demoQueue.list[demoQueue.idx];
    setNp({
      name: track.name, artist: track.artist, album: track.album, art: null,
      duration: track.duration, progress: demoQueue.progress, playing: demoQueue.playing,
    });
  }, [mode, demoQueue]);

  // ---------- Menu data loaders ----------
  const pushFrame = f => { setStack(s => [...s, f]); setSelIndex(0); };

  const openMusic = () => pushFrame({
    title: "Music", type: "menu",
    items: [
      { label: "Playlists", action: "playlists" },
      { label: "Songs", action: "songs" },
      { label: "Top Tracks", action: "top" },
    ],
  });

  const loadList = async (action) => {
    if (mode === "demo") {
      if (action === "playlists")
        pushFrame({ title: "Playlists", type: "menu", items: DEMO.playlists.map(p => ({ label: p.name, action: "demo-playlist", data: p })) });
      else
        pushFrame({ title: action === "top" ? "Top Tracks" : "Songs", type: "tracks", items: DEMO.tracks.map((t, i) => ({ label: t.name, sub: t.artist, action: "demo-play", data: i })) });
      return;
    }
    try {
      if (action === "playlists") {
        const d = await api("/me/playlists?limit=50");
        pushFrame({ title: "Playlists", type: "menu",
          items: d.items.filter(Boolean).map(p => ({ label: p.name, action: "playlist", data: p })) });
      } else if (action === "songs") {
        const d = await api("/me/tracks?limit=50");
        pushFrame({ title: "Songs", type: "tracks",
          items: d.items.map(x => ({ label: x.track.name, sub: x.track.artists[0]?.name, action: "play-uri", data: x.track.uri })) });
      } else if (action === "top") {
        const d = await api("/me/top/tracks?limit=50");
        pushFrame({ title: "Top Tracks", type: "tracks",
          items: d.items.map(t => ({ label: t.name, sub: t.artists[0]?.name, action: "play-uri", data: t.uri })) });
      }
    } catch { flashMsg("Couldn't load. Open Spotify once, then retry."); }
  };

  const openPlaylist = async (p) => {
    try {
      const d = await api(`/playlists/${p.id}/tracks?limit=100`);
      pushFrame({ title: p.name, type: "tracks",
        items: d.items.filter(x => x.track).map(x => ({
          label: x.track.name, sub: x.track.artists[0]?.name,
          action: "play-context", data: { context: p.uri, uri: x.track.uri },
        })) });
    } catch { flashMsg("Couldn't load playlist."); }
  };

  const playUri = async (uri, context) => {
    try {
      const body = context ? { context_uri: context, offset: { uri } } : { uris: [uri] };
      await api("/me/player/play", { method: "PUT", body: JSON.stringify(body) });
      setScreen("nowplaying");
    } catch {
      flashMsg("No active device — open Spotify on your phone first.");
    }
  };

  // ---------- Select handler ----------
  const onSelect = () => {
    if (screen === "nowplaying") return;
    const frame = stack[stack.length - 1];
    if (!frame) return;
    const item = frame.items[selIndex];
    if (!item) return;
    switch (item.action) {
      case "music": openMusic(); break;
      case "nowplaying": setScreen("nowplaying"); break;
      case "shuffle":
        if (mode === "demo") { setDemoQueue(q => ({ ...q, idx: Math.floor(Math.random() * q.list.length), progress: 0, playing: true })); setScreen("nowplaying"); }
        else { api("/me/player/shuffle?state=true", { method: "PUT" }).then(() => api("/me/player/next", { method: "POST" })).then(() => setScreen("nowplaying")).catch(() => flashMsg("No active device — open Spotify first.")); }
        break;
      case "settings":
        pushFrame({ title: "Settings", type: "menu", items: [
          { label: mode === "demo" ? "Mode: Demo" : "Mode: Spotify", action: "noop" },
          { label: "Sign out", action: "signout" },
          { label: "About", action: "about" },
        ]});
        break;
      case "playlists": case "songs": case "top": loadList(item.action); break;
      case "playlist": openPlaylist(item.data); break;
      case "play-uri": playUri(item.data); break;
      case "play-context": playUri(item.data.uri, item.data.context); break;
      case "demo-playlist":
        pushFrame({ title: item.data.name, type: "tracks", items: DEMO.tracks.map((t, i) => ({ label: t.name, sub: t.artist, action: "demo-play", data: i })) });
        break;
      case "demo-play":
        setDemoQueue(q => ({ ...q, idx: item.data, progress: 0, playing: true }));
        setScreen("nowplaying");
        break;
      case "signout":
        store.del("sp_token"); store.del("sp_refresh"); store.del("sp_expiry");
        setMode("setup"); setNp(null);
        break;
      case "about":
        pushFrame({ title: "About", type: "about", items: [] });
        break;
      default: break;
    }
  };

  // ---------- Menu / back ----------
  const onMenu = () => {
    if (screen === "nowplaying") { setScreen("menu"); return; }
    if (stack.length > 1) { setStack(s => s.slice(0, -1)); setSelIndex(0); }
  };

  // ---------- Transport ----------
  const onPlayPause = () => {
    if (mode === "demo") setDemoQueue(q => ({ ...q, playing: !q.playing }));
    else if (np) api(np.playing ? "/me/player/pause" : "/me/player/play", { method: "PUT" }).catch(() => flashMsg("No active device."));
  };
  const onNext = () => {
    if (mode === "demo") setDemoQueue(q => ({ ...q, idx: (q.idx + 1) % q.list.length, progress: 0 }));
    else api("/me/player/next", { method: "POST" }).catch(() => flashMsg("No active device."));
  };
  const onPrev = () => {
    if (mode === "demo") setDemoQueue(q => ({ ...q, idx: (q.idx - 1 + q.list.length) % q.list.length, progress: 0 }));
    else api("/me/player/previous", { method: "POST" }).catch(() => flashMsg("No active device."));
  };

  // ---------- Scroll ----------
  const frame = stack[stack.length - 1];
  const scrollBy = useCallback((delta) => {
    if (screen === "nowplaying") return;
    const f = stack[stack.length - 1];
    if (!f || !f.items.length) return;
    setSelIndex(i => Math.min(Math.max(i + delta, 0), f.items.length - 1));
  }, [stack, screen]);

  // ---------- Click wheel rotation gesture ----------
  const wheelRef = useRef(null);
  const angleRef = useRef(null);
  const accumRef = useRef(0);

  const angleOf = (e) => {
    const rect = wheelRef.current.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    const pt = e.touches ? e.touches[0] : e;
    return Math.atan2(pt.clientY - cy, pt.clientX - cx);
  };
  const gestureStart = (e) => { angleRef.current = angleOf(e); accumRef.current = 0; };
  const gestureMove = (e) => {
    if (angleRef.current == null) return;
    const a = angleOf(e);
    let d = a - angleRef.current;
    if (d > Math.PI) d -= 2 * Math.PI;
    if (d < -Math.PI) d += 2 * Math.PI;
    angleRef.current = a;
    accumRef.current += d;
    const STEP = 0.42; // radians per tick
    while (accumRef.current > STEP) { scrollBy(1); accumRef.current -= STEP; clickTick(); }
    while (accumRef.current < -STEP) { scrollBy(-1); accumRef.current += STEP; clickTick(); }
  };
  const gestureEnd = () => { angleRef.current = null; };

  const audioCtxRef = useRef(null);
  const clickTick = () => {
    try {
      if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtxRef.current;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.frequency.value = 1800; g.gain.value = 0.03;
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + 0.015);
    } catch { /* audio unavailable */ }
  };

  // Keyboard support
  useEffect(() => {
    const h = (e) => {
      if (mode === "setup") return;
      if (e.key === "ArrowDown") { e.preventDefault(); scrollBy(1); }
      if (e.key === "ArrowUp") { e.preventDefault(); scrollBy(-1); }
      if (e.key === "Enter") onSelect();
      if (e.key === "Escape" || e.key === "Backspace") onMenu();
      if (e.key === " ") { e.preventDefault(); onPlayPause(); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  });

  // ---------- Battery-style clock ----------
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 30000); return () => clearInterval(t); }, []);

  // ============================================================
  // RENDER
  // ============================================================

  const visibleWindow = () => {
    if (!frame) return [];
    const VISIBLE = 7;
    let start = Math.max(0, Math.min(selIndex - 3, frame.items.length - VISIBLE));
    return frame.items.slice(start, start + VISIBLE).map((it, i) => ({ ...it, _idx: start + i }));
  };

  const S = styles;

  // -------- Setup screen (rendered inside the iPod LCD) --------
  const renderSetup = () => (
    <div style={{ ...S.lcdInner, padding: 10, display: "flex", flexDirection: "column", gap: 8, overflowY: "auto" }}>
      <div style={{ fontWeight: 700, fontSize: 13, textAlign: "center" }}>Connect Spotify</div>
      <div style={{ fontSize: 10, lineHeight: 1.5 }}>
        1. Go to <b>developer.spotify.com/dashboard</b>, create an app.<br />
        2. Add this exact Redirect URI:<br />
        <span style={{ fontSize: 9, wordBreak: "break-all", background: "#dfe6dc", padding: "1px 3px", borderRadius: 2 }}>
          {typeof window !== "undefined" ? window.location.origin + window.location.pathname : ""}
        </span><br />
        3. Paste your Client ID below.
      </div>
      <input
        value={clientId}
        onChange={e => setClientId(e.target.value)}
        placeholder="Spotify Client ID"
        style={{ fontSize: 11, padding: "5px 6px", borderRadius: 3, border: "1px solid #9aa79a", background: "#f2f6f0", width: "100%", boxSizing: "border-box" }}
      />
      {authError && <div style={{ fontSize: 9, color: "#8a2222" }}>{authError}</div>}
      <button onClick={() => clientId.trim() && beginLogin(clientId.trim())} style={S.lcdButton}>Sign in with Spotify</button>
      <button onClick={() => { setMode("demo"); }} style={{ ...S.lcdButton, background: "#c8d2c6" }}>Try Demo Mode</button>
      <div style={{ fontSize: 8.5, opacity: 0.7, lineHeight: 1.4 }}>
        Sign-in requires this app to be deployed (Vercel, etc.). In this preview, use Demo Mode.
      </div>
    </div>
  );

  // -------- Menu screen --------
  const renderMenu = () => (
    <div style={S.lcdInner}>
      <div style={S.statusBar}>
        <span style={{ width: 30 }}>{np?.playing ? "▶" : np ? "❙❙" : ""}</span>
        <span style={{ fontWeight: 700 }}>{frame?.title || "iPod"}</span>
        <span style={S.battery}><span style={S.batteryFill} /></span>
      </div>
      {frame?.type === "about" ? (
        <div style={{ padding: 12, fontSize: 10, lineHeight: 1.6 }}>
          <b>iPod Classic × Spotify</b><br />
          A pocket time machine.<br /><br />
          Scroll the wheel. Press the center to select. MENU goes back.<br /><br />
          {now.toLocaleDateString()}
        </div>
      ) : (
        <div style={{ flex: 1, overflow: "hidden" }}>
          {visibleWindow().map(it => (
            <div key={it._idx}
              onClick={() => { setSelIndex(it._idx); }}
              style={{ ...S.menuRow, ...(it._idx === selIndex ? S.menuRowSel : {}) }}>
              <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {it.label}{it.sub ? <span style={{ opacity: 0.65, fontSize: 9 }}> — {it.sub}</span> : null}
              </span>
              <span>{it._idx === selIndex ? "›" : ""}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  // -------- Now Playing screen --------
  const renderNowPlaying = () => {
    const pct = np && np.duration ? Math.min(100, (np.progress / np.duration) * 100) : 0;
    return (
      <div style={S.lcdInner}>
        <div style={S.statusBar}>
          <span style={{ width: 30 }}>{np?.playing ? "▶" : "❙❙"}</span>
          <span style={{ fontWeight: 700 }}>Now Playing</span>
          <span style={S.battery}><span style={S.batteryFill} /></span>
        </div>
        {np ? (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: "8px 12px", gap: 6 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center", flex: 1 }}>
              <div style={S.artBox}>
                {np.art
                  ? <img src={np.art} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  : <div style={S.artPlaceholder}>♪</div>}
              </div>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 12, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{np.name}</div>
                <div style={{ fontSize: 10, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{np.artist}</div>
                <div style={{ fontSize: 9, opacity: 0.7, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{np.album}</div>
              </div>
            </div>
            <div>
              <div style={S.progressTrack}><div style={{ ...S.progressFill, width: pct + "%" }} /></div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, marginTop: 2 }}>
                <span>{fmt(np.progress)}</span><span>-{fmt(Math.max(0, np.duration - np.progress))}</span>
              </div>
            </div>
          </div>
        ) : (
          <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, opacity: 0.7, padding: 16, textAlign: "center" }}>
            Nothing playing.{mode === "live" ? " Start Spotify on your phone, or pick a song from Music." : ""}
          </div>
        )}
      </div>
    );
  };

  return (
    <div style={S.page}>
      <div style={S.body}>
        {/* LCD */}
        <div style={S.lcdBezel}>
          <div style={S.lcd}>
            {mode === "setup" ? renderSetup() : screen === "nowplaying" ? renderNowPlaying() : renderMenu()}
            {flash && <div style={S.flash}>{flash}</div>}
          </div>
        </div>

        {/* Click wheel */}
        <div
          ref={wheelRef}
          style={S.wheel}
          onMouseDown={gestureStart} onMouseMove={gestureMove} onMouseUp={gestureEnd} onMouseLeave={gestureEnd}
          onTouchStart={gestureStart} onTouchMove={gestureMove} onTouchEnd={gestureEnd}
        >
          <button aria-label="Menu" style={{ ...S.wheelBtn, top: 8, left: "50%", transform: "translateX(-50%)" }}
            onClick={onMenu} onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); onMenu(); }}>MENU</button>
          <button aria-label="Previous" style={{ ...S.wheelBtn, left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13 }}
            onClick={onPrev} onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); onPrev(); }}>⏮</button>
          <button aria-label="Next" style={{ ...S.wheelBtn, right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13 }}
            onClick={onNext} onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); onNext(); }}>⏭</button>
          <button aria-label="Play / Pause" style={{ ...S.wheelBtn, bottom: 8, left: "50%", transform: "translateX(-50%)", fontSize: 12 }}
            onClick={onPlayPause} onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); onPlayPause(); }}>⏯</button>
          <button aria-label="Select"
            style={S.centerBtn}
            onClick={onSelect}
            onTouchEnd={e => { e.preventDefault(); e.stopPropagation(); onSelect(); }}
          />
        </div>
      </div>
      <div style={S.hint}>Drag around the wheel to scroll · center button selects · MENU goes back</div>
    </div>
  );
}
