<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>iPod</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#16181c" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #16181c; overscroll-behavior: none; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; user-select: none; -webkit-user-select: none; }

  /* iPod body */
  .ipod { width: 320px; max-width: 92vw; border-radius: 26px; background: linear-gradient(175deg, #f8f9fb 0%, #dfe2e8 45%, #c9ccd4 100%); box-shadow: 0 22px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -2px 6px rgba(0,0,0,0.15); padding: 22px 20px 26px; display: flex; flex-direction: column; align-items: center; gap: 26px; }

  /* Screen bezel */
  .bezel { width: 100%; border-radius: 8px; background: linear-gradient(180deg, #1c1e22, #2e3138); padding: 7px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.7); }
  .screen { position: relative; width: 100%; aspect-ratio: 4 / 3; border-radius: 4px; overflow: hidden; background: linear-gradient(180deg, #eef3ec 0%, #dde5da 100%); box-shadow: inset 0 0 12px rgba(60,80,60,0.25); color: #1e241e; font-size: 11px; display: flex; flex-direction: column; }

  /* Status bar */
  .status-bar { display: flex; align-items: center; justify-content: space-between; padding: 3px 8px; font-size: 10px; background: linear-gradient(180deg, #cfd8cc, #b9c4b6); border-bottom: 1px solid #97a394; flex-shrink: 0; z-index: 2; }
  .battery { width: 22px; height: 10px; border: 1.5px solid #445044; border-radius: 2px; display: inline-block; padding: 1px; }
  .battery-fill { display: block; width: 78%; height: 100%; background: #4d6b4d; border-radius: 1px; }

  /* Menu list */
  .menu-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .menu-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; font-size: 11.5px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .menu-row.selected { background: linear-gradient(180deg, #5f8fd4, #2e5ea8); color: #fff; font-weight: 600; }
  .menu-row .label { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .menu-row .arrow { margin-left: 6px; flex-shrink: 0; }

  /* Add music input */
  .add-area { padding: 10px; display: flex; flex-direction: column; gap: 6px; flex: 1; overflow-y: auto; }
  .add-area input { font-size: 11px; padding: 6px; border-radius: 3px; border: 1px solid #9aa79a; background: #f2f6f0; width: 100%; font-family: inherit; }
  .add-area .btn { font-size: 11px; font-weight: 700; padding: 7px 8px; border-radius: 4px; border: 1px solid #7f8d7d; background: #aebfaa; color: #1e241e; cursor: pointer; font-family: inherit; text-align: center; }
  .add-area .btn:active { background: #98ab94; }
  .add-area .hint { font-size: 9px; opacity: 0.65; line-height: 1.4; }

  /* Embed player */
  .embed-wrap { flex: 1; display: flex; flex-direction: column; position: relative; }
  .embed-wrap iframe { flex: 1; width: 100%; border: none; border-radius: 0; }

  /* Flash message */
  .flash { position: absolute; bottom: 6px; left: 8px; right: 8px; background: rgba(30,36,30,0.9); color: #eef3ec; font-size: 9.5px; padding: 5px 8px; border-radius: 4px; text-align: center; z-index: 10; pointer-events: none; animation: flashFade 1.8s forwards; }
  @keyframes flashFade { 0%,70% { opacity: 1; } 100% { opacity: 0; } }

  /* Click wheel */
  .wheel { position: relative; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fbfcfd, #dfe3e9 55%, #c6cbd4 100%); box-shadow: inset 0 2px 6px rgba(255,255,255,0.9), inset 0 -3px 8px rgba(0,0,0,0.18), 0 3px 10px rgba(0,0,0,0.25); touch-action: none; cursor: grab; }
  .wheel-btn { position: absolute; border: none; background: transparent; color: #8a8f99; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; padding: 8px; font-family: inherit; }
  .wheel-btn.top { top: 8px; left: 50%; transform: translateX(-50%); }
  .wheel-btn.left { left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; }
  .wheel-btn.right { right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; }
  .wheel-btn.bottom { bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 12px; }
  .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 74px; height: 74px; border-radius: 50%; border: none; cursor: pointer; background: radial-gradient(circle at 38% 32%, #eef0f4, #cdd1d9 60%, #b8bdc7 100%); box-shadow: inset 0 2px 4px rgba(255,255,255,0.85), inset 0 -2px 5px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.25); }

  .footer-hint { margin-top: 14px; font-size: 11px; color: #8a8f99; text-align: center; }

  /* Delete button */
  .del-btn { font-size: 9px; color: #9a4444; cursor: pointer; flex-shrink: 0; margin-left: 4px; padding: 2px 4px; }
</style>
</head>
<body>

<div class="ipod">
  <div class="bezel">
    <div class="screen" id="screen"></div>
  </div>
  <div class="wheel" id="wheel">
    <button class="wheel-btn top" id="btnMenu">MENU</button>
    <button class="wheel-btn left" id="btnPrev">⏮</button>
    <button class="wheel-btn right" id="btnNext">⏭</button>
    <button class="wheel-btn bottom" id="btnPlay">⏯</button>
    <button class="center-btn" id="btnSelect"></button>
  </div>
</div>
<div class="footer-hint">Drag around the wheel to scroll · center selects · MENU goes back</div>

<script>
// ── Safe Storage ──
const mem = {};
const S = {
  get(k) { try { return localStorage.getItem(k); } catch { return mem[k] ?? null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch { mem[k] = v; } },
};

// ── Library (persisted) ──
function loadLibrary() {
  try { return JSON.parse(S.get('ipod_lib') || '[]'); } catch { return []; }
}
function saveLibrary(lib) { S.set('ipod_lib', JSON.stringify(lib)); }

// ── Parse Spotify URL ──
function parseSpotifyUrl(url) {
  // https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M
  // https://open.spotify.com/album/4aawyAB9vmqN3uQ7FjRGTy
  // https://open.spotify.com/track/4iV5W9uYEdYUVa79Axb7Rh
  // spotify:playlist:37i9dQZF1DXcBWIGoYBM5M
  const urlMatch = url.match(/open\.spotify\.com\/(playlist|album|track)\/([a-zA-Z0-9]+)/);
  if (urlMatch) return { type: urlMatch[1], id: urlMatch[2] };
  const uriMatch = url.match(/spotify:(playlist|album|track):([a-zA-Z0-9]+)/);
  if (uriMatch) return { type: uriMatch[1], id: uriMatch[2] };
  return null;
}

function embedUrl(type, id) {
  return `https://open.spotify.com/embed/${type}/${id}?utm_source=generator&theme=0`;
}

// ── Fetch metadata via oEmbed ──
async function fetchMeta(type, id) {
  try {
    const url = `https://open.spotify.com/${type}/${id}`;
    const res = await fetch(`https://open.spotify.com/oembed?url=${encodeURIComponent(url)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return { title: data.title || 'Unknown', thumbnail: data.thumbnail_url || null };
  } catch { return null; }
}

// ── State ──
let library = loadLibrary();
let navStack = []; // each: { title, items, type }
let selIndex = 0;
let currentView = 'menu'; // 'menu' | 'player' | 'add'
let currentEmbed = null; // { type, id, title }
let flashTimer = null;

const screen = document.getElementById('screen');

// ── Rendering ──
function render() {
  screen.innerHTML = '';
  if (currentView === 'add') renderAdd();
  else if (currentView === 'player') renderPlayer();
  else renderMenu();
}

function statusBar(title, extra) {
  return `<div class="status-bar">
    <span style="width:30px">${extra || ''}</span>
    <span style="font-weight:700">${title}</span>
    <span class="battery"><span class="battery-fill"></span></span>
  </div>`;
}

function renderMenu() {
  const frame = navStack[navStack.length - 1];
  if (!frame) return;
  const VISIBLE = 7;
  let start = Math.max(0, Math.min(selIndex - 3, frame.items.length - VISIBLE));
  const visible = frame.items.slice(start, start + VISIBLE);

  let html = statusBar(frame.title, currentEmbed ? '▶' : '');
  html += '<div class="menu-area">';
  visible.forEach((item, i) => {
    const idx = start + i;
    const sel = idx === selIndex ? ' selected' : '';
    html += `<div class="menu-row${sel}" data-idx="${idx}">
      <span class="label">${item.label}${item.sub ? ` <span style="opacity:0.6;font-size:9px">— ${item.sub}</span>` : ''}</span>
      <span class="arrow">${idx === selIndex ? '›' : ''}</span>
    </div>`;
  });
  html += '</div>';
  screen.innerHTML = html;

  // Click on rows
  screen.querySelectorAll('.menu-row').forEach(row => {
    row.addEventListener('click', () => {
      selIndex = parseInt(row.dataset.idx);
      render();
    });
  });
}

function renderPlayer() {
  if (!currentEmbed) { currentView = 'menu'; render(); return; }
  let html = statusBar('Now Playing', '▶');
  html += `<div class="embed-wrap">
    <iframe src="${embedUrl(currentEmbed.type, currentEmbed.id)}" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy"></iframe>
  </div>`;
  screen.innerHTML = html;
}

function renderAdd() {
  let html = statusBar('Add Music');
  html += `<div class="add-area">
    <div style="font-weight:700;font-size:12px;text-align:center">Add from Spotify</div>
    <div class="hint">
      Open Spotify → tap Share on any playlist, album, or song → Copy Link → paste below
    </div>
    <input id="urlInput" placeholder="Paste Spotify link here..." />
    <div class="btn" id="addBtn">Add to iPod</div>
    <div class="hint" style="margin-top:4px">
      Works with playlists, albums, and tracks.<br>
      Example: open.spotify.com/playlist/37i9...
    </div>
    <div id="addStatus"></div>
  </div>`;
  screen.innerHTML = html;

  document.getElementById('addBtn').addEventListener('click', addFromInput);
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addFromInput();
  });
  // Focus input after tiny delay (mobile keyboard)
  setTimeout(() => document.getElementById('urlInput')?.focus(), 100);
}

async function addFromInput() {
  const input = document.getElementById('urlInput');
  const status = document.getElementById('addStatus');
  if (!input || !status) return;
  const val = input.value.trim();
  if (!val) { flash('Paste a Spotify link first'); return; }

  const parsed = parseSpotifyUrl(val);
  if (!parsed) { flash('Not a valid Spotify link'); return; }

  // Check duplicate
  if (library.some(item => item.id === parsed.id)) { flash('Already in your library'); return; }

  status.innerHTML = '<span style="font-size:10px">Loading...</span>';

  const meta = await fetchMeta(parsed.type, parsed.id);
  const entry = {
    type: parsed.type,
    id: parsed.id,
    title: meta?.title || `${parsed.type} · ${parsed.id.slice(0,8)}`,
    thumbnail: meta?.thumbnail || null,
    added: Date.now(),
  };
  library.push(entry);
  saveLibrary(library);

  input.value = '';
  flash(`Added: ${entry.title}`);
  status.innerHTML = `<span style="font-size:10px;color:#3a6a3a">✓ ${entry.title}</span>`;
}

function flash(msg) {
  const existing = screen.querySelector('.flash');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'flash';
  el.textContent = msg;
  screen.appendChild(el);
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.remove(), 1800);
}

// ── Menu Structure ──
function buildRoot() {
  return {
    title: 'iPod',
    type: 'root',
    items: [
      { label: 'Music', action: 'music' },
      { label: 'Now Playing', action: 'nowplaying' },
      { label: 'Add Music', action: 'add' },
      { label: 'Settings', action: 'settings' },
    ],
  };
}

function buildMusic() {
  const items = [];
  const playlists = library.filter(x => x.type === 'playlist');
  const albums = library.filter(x => x.type === 'album');
  const tracks = library.filter(x => x.type === 'track');
  if (playlists.length) items.push({ label: 'Playlists', action: 'cat', data: 'playlist' });
  if (albums.length) items.push({ label: 'Albums', action: 'cat', data: 'album' });
  if (tracks.length) items.push({ label: 'Songs', action: 'cat', data: 'track' });
  if (!items.length) items.push({ label: 'No music yet', sub: 'go back & tap Add Music', action: 'noop' });
  return { title: 'Music', type: 'menu', items };
}

function buildCategory(type) {
  const titles = { playlist: 'Playlists', album: 'Albums', track: 'Songs' };
  const items = library.filter(x => x.type === type).map(x => ({
    label: x.title, action: 'play', data: x,
  }));
  return { title: titles[type] || 'Music', type: 'menu', items };
}

function buildSettings() {
  return {
    title: 'Settings',
    type: 'menu',
    items: [
      { label: `Library: ${library.length} item${library.length !== 1 ? 's' : ''}`, action: 'noop' },
      { label: 'Manage Library', action: 'manage' },
      { label: 'About', action: 'about' },
    ],
  };
}

function buildManage() {
  if (!library.length) return { title: 'Library', type: 'menu', items: [{ label: 'Empty', action: 'noop' }] };
  const items = library.map((x, i) => ({
    label: x.title, sub: x.type, action: 'remove', data: i,
  }));
  items.push({ label: '← Back', action: 'back' });
  return { title: 'Manage', type: 'menu', items };
}

// ── Init ──
navStack = [buildRoot()];
selIndex = 0;
render();

// ── Actions ──
function onSelect() {
  if (currentView === 'player') return; // embed handles interaction
  if (currentView === 'add') return; // input handles interaction

  const frame = navStack[navStack.length - 1];
  if (!frame || !frame.items.length) return;
  const item = frame.items[selIndex];
  if (!item) return;

  switch (item.action) {
    case 'music':
      navStack.push(buildMusic());
      selIndex = 0;
      render();
      break;
    case 'cat':
      navStack.push(buildCategory(item.data));
      selIndex = 0;
      render();
      break;
    case 'play':
      currentEmbed = { type: item.data.type, id: item.data.id, title: item.data.title };
      currentView = 'player';
      render();
      break;
    case 'nowplaying':
      if (currentEmbed) { currentView = 'player'; render(); }
      else flash('Nothing playing yet');
      break;
    case 'add':
      currentView = 'add';
      render();
      break;
    case 'settings':
      navStack.push(buildSettings());
      selIndex = 0;
      render();
      break;
    case 'manage':
      navStack.push(buildManage());
      selIndex = 0;
      render();
      break;
    case 'remove':
      const name = library[item.data]?.title;
      library.splice(item.data, 1);
      saveLibrary(library);
      flash(`Removed: ${name}`);
      navStack[navStack.length - 1] = buildManage();
      selIndex = Math.min(selIndex, navStack[navStack.length - 1].items.length - 1);
      render();
      break;
    case 'about':
      navStack.push({ title: 'About', type: 'menu', items: [
        { label: 'iPod Classic × Spotify', action: 'noop' },
        { label: 'Scroll the wheel to browse', action: 'noop' },
        { label: 'Center button = select', action: 'noop' },
        { label: 'MENU = go back', action: 'noop' },
      ]});
      selIndex = 0;
      render();
      break;
    case 'back':
      onMenu();
      break;
    default: break;
  }
}

function onMenu() {
  if (currentView === 'player') { currentView = 'menu'; render(); return; }
  if (currentView === 'add') { currentView = 'menu'; render(); return; }
  if (navStack.length > 1) { navStack.pop(); selIndex = 0; render(); }
}

function scrollBy(delta) {
  if (currentView !== 'menu') return;
  const frame = navStack[navStack.length - 1];
  if (!frame || !frame.items.length) return;
  selIndex = Math.min(Math.max(selIndex + delta, 0), frame.items.length - 1);
  render();
  clickTick();
}

// ── Click Wheel Gesture ──
const wheel = document.getElementById('wheel');
let lastAngle = null;
let accum = 0;

function angleOf(e) {
  const rect = wheel.getBoundingClientRect();
  const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
  const pt = e.touches ? e.touches[0] : e;
  return Math.atan2(pt.clientY - cy, pt.clientX - cx);
}
function gestureStart(e) { lastAngle = angleOf(e); accum = 0; }
function gestureMove(e) {
  if (lastAngle === null) return;
  const a = angleOf(e);
  let d = a - lastAngle;
  if (d > Math.PI) d -= 2 * Math.PI;
  if (d < -Math.PI) d += 2 * Math.PI;
  lastAngle = a;
  accum += d;
  const STEP = 0.42;
  while (accum > STEP) { scrollBy(1); accum -= STEP; }
  while (accum < -STEP) { scrollBy(-1); accum += STEP; }
}
function gestureEnd() { lastAngle = null; }

wheel.addEventListener('mousedown', gestureStart);
wheel.addEventListener('mousemove', gestureMove);
wheel.addEventListener('mouseup', gestureEnd);
wheel.addEventListener('mouseleave', gestureEnd);
wheel.addEventListener('touchstart', gestureStart, { passive: true });
wheel.addEventListener('touchmove', gestureMove, { passive: true });
wheel.addEventListener('touchend', gestureEnd);

// ── Audio tick ──
let audioCtx = null;
function clickTick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = 1800; g.gain.value = 0.025;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.012);
  } catch {}
}

// ── Buttons ──
document.getElementById('btnMenu').addEventListener('click', e => { e.stopPropagation(); onMenu(); });
document.getElementById('btnSelect').addEventListener('click', e => { e.stopPropagation(); onSelect(); });
document.getElementById('btnPrev').addEventListener('click', e => { e.stopPropagation(); });
document.getElementById('btnNext').addEventListener('click', e => { e.stopPropagation(); });
document.getElementById('btnPlay').addEventListener('click', e => { e.stopPropagation(); });

// Touch events for buttons (prevent wheel gesture interference)
['btnMenu','btnSelect','btnPrev','btnNext','btnPlay'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('touchend', e => {
    e.preventDefault();
    e.stopPropagation();
    if (id === 'btnMenu') onMenu();
    else if (id === 'btnSelect') onSelect();
  });
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (currentView === 'add' && e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown') { e.preventDefault(); scrollBy(1); }
  if (e.key === 'ArrowUp') { e.preventDefault(); scrollBy(-1); }
  if (e.key === 'Enter') onSelect();
  if (e.key === 'Escape' || e.key === 'Backspace') { e.preventDefault(); onMenu(); }
});

// ── Pre-load starter playlists so it's not empty ──
(async function preload() {
  if (library.length > 0) return; // user already has music
  const starters = [
    { type: 'playlist', id: '37i9dQZF1DXcBWIGoYBM5M' }, // Today's Top Hits
    { type: 'playlist', id: '37i9dQZF1DX0XUsuxWHRQd' }, // RapCaviar
    { type: 'playlist', id: '37i9dQZF1DWXRqgorJj26U' }, // Rock Classics
    { type: 'playlist', id: '37i9dQZF1DX4sWSpwq3LiO' }, // Peaceful Piano
  ];
  for (const s of starters) {
    const meta = await fetchMeta(s.type, s.id);
    if (meta) {
      library.push({ type: s.type, id: s.id, title: meta.title, thumbnail: meta.thumbnail, added: Date.now() });
    }
  }
  if (library.length) {
    saveLibrary(library);
    navStack = [buildRoot()];
    selIndex = 0;
    render();
  }
})();
</script>
</body>
</html>
